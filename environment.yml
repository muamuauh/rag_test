# 默认创建 CPU 版 conda 环境。GPU 用户参见下方"CUDA 变体"。
#
# 创建（CPU 默认）：
#   conda env create -f environment.yml
#   conda activate rag_test
#
# 切换到 CUDA 变体（已建好 env 的情况下）：
#   conda activate rag_test
#   pip uninstall -y torch
#   pip install -r requirements-cuda.txt

name: rag_test
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - -r requirements-cpu.txt
